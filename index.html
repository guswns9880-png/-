<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>입금 관리 앱</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding:20px; background:#f5f5f5;}
.container { max-width:600px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, button { width:100%; padding:10px; margin:5px 0; }
button { background:black; color:white; border:none; cursor:pointer;}
.entry { border-bottom:1px solid #ddd; padding:10px 0;}
</style>
</head>
<body>
<div class="container">
<h2>입금 예정 관리</h2>

<input type="date" id="date">
<input type="text" id="card" placeholder="카드사">
<input type="number" id="amount" placeholder="금액">

<button onclick="addEntry()">추가</button>

<hr>

<div id="list"></div>
</div>

<script>
let entries = [];

function addEntry() {
  const date = document.getElementById('date').value;
  const card = document.getElementById('card').value;
  const amount = document.getElementById('amount').value;

  if(!date || !card || !amount) return;

  entries.push({date, card, amount: Number(amount)});
  render();

  document.getElementById('card').value = '';
  document.getElementById('amount').value = '';
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  const grouped = {};

  entries.forEach(e => {
    if(!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });

  Object.keys(grouped).forEach(date => {
    const div = document.createElement('div');
    div.className = 'entry';

    let total = 0;
    let html = `<strong>${date}</strong><br>`;

    grouped[date].forEach(i => {
      total += i.amount;
      html += `${i.card} : ${i.amount.toLocaleString()}원<br>`;
    });

    html += `<strong>합계: ${total.toLocaleString()}원</strong>`;
    div.innerHTML = html;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
