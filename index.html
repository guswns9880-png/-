<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>입금 관리 앱</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
.wrap { display:flex; gap:10px; padding:10px; }
.panel { flex:1; background:#fff; padding:15px; border-radius:10px; }
input, button { width:100%; padding:10px; margin:5px 0; }
button { background:black; color:white; border:none; cursor:pointer; }
.tabs { display:flex; flex-wrap:wrap; gap:5px; }
.tab { padding:8px 10px; border:1px solid #ddd; border-radius:6px; cursor:pointer; }
.tab.active { background:black; color:white; }
.calendar { display:grid; grid-template-columns: repeat(7, 1fr); gap:5px; }
.day { border:1px solid #ddd; min-height:100px; padding:5px; font-size:12px; }
.day strong { display:block; }
.item { font-size:11px; display:flex; justify-content:space-between; }
.delete-btn { background:red; margin-top:5px; }
.small-btn { background:#666; font-size:10px; padding:3px 5px; }
.footer { margin-top:10px; border-top:1px solid #ddd; padding-top:10px; }
.day-total { color:blue; font-weight:bold; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">

<!-- 입력 패널 -->
<div class="panel">
<h3>데이터 입력</h3>
<input type="date" id="date">

<div class="tabs" id="cardTabs"></div>

<input type="number" id="amount" placeholder="금액">
<button onclick="addEntry()">추가</button>
</div>

<!-- 달력 패널 -->
<div class="panel">
<h3>달력</h3>
<div style="display:flex; gap:5px;">
  <button onclick="changeMonth(-1)">◀</button>
  <div id="monthLabel" style="flex:1; text-align:center;"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar" id="calendar"></div>

<!-- ✅ 하단 요약 영역 -->
<div class="footer">
  <div id="monthTotal"></div>
  <button class="delete-btn" onclick="deleteMonth()">이번달 전체삭제</button>
</div>

</div>

</div>

<script>
const cards = ["삼성카드","우리카드","롯데카드","현대카드","비씨카드","신한카드","농협NH카드","KB카드","하나카드"];
let selectedCard = null;

// ✅ 저장 데이터
let entries = JSON.parse(localStorage.getItem('entries') || '[]');

// ✅ 현재 보고 있는 달
let current = new Date();

// 카드 탭
const tabContainer = document.getElementById('cardTabs');
cards.forEach(card => {
  const btn = document.createElement('div');
  btn.className = 'tab';
  btn.innerText = card;
  btn.onclick = () => {
    selectedCard = card;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  };
  tabContainer.appendChild(btn);
});

function save() {
  localStorage.setItem('entries', JSON.stringify(entries));
}

function addEntry() {
  const date = document.getElementById('date').value;
  const amount = document.getElementById('amount').value;

  if(!date || !selectedCard || !amount) return;

  entries.push({date, card: selectedCard, amount: Number(amount)});
  save();
  render();
  document.getElementById('amount').value = '';
}

// ✅ 엔터 입력 시 추가 실행
window.addEventListener('keypress', function(e){
  if(e.key === 'Enter') addEntry();
});

function changeMonth(diff){
  current.setMonth(current.getMonth() + diff);
  render();
}

function render() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const year = current.getFullYear();
  const month = current.getMonth();

  document.getElementById('monthLabel').innerText = `${year}년 ${month+1}월`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();

  const grouped = {};
  let monthTotal = 0;

  entries.forEach((e, idx) => {
    const d = new Date(e.date);
    if(d.getFullYear() === year && d.getMonth() === month){
      if(!grouped[e.date]) grouped[e.date] = [];
      grouped[e.date].push({...e, idx});
      monthTotal += e.amount;
    }
  });

  // 빈칸
  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement('div'));
  }

  for(let d=1; d<=lastDate; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const div = document.createElement('div');
    div.className = 'day';

    let html = `<strong>${d}</strong>`;
    let dayTotal = 0;

    if(grouped[dateStr]){
      const cardMap = {};

      grouped[dateStr].forEach(item => {
        dayTotal += item.amount;
        if(!cardMap[item.card]) cardMap[item.card] = {total:0, items:[]};
        cardMap[item.card].total += item.amount;
        cardMap[item.card].items.push(item);
      });

      // ✅ 날짜 총합 표시 (추가된 기능)
      html = `<div class='day-total'>총합: ${dayTotal.toLocaleString()}원</div>` + html;

      Object.keys(cardMap).forEach(card => {
        const c = cardMap[card];
        html += `<div>${card} (${c.items.length}건) : ${c.total.toLocaleString()}원</div>`;

        c.items.forEach(i => {
          html += `<div class='item'>
            <span>└ ${i.amount.toLocaleString()}원</span>
            <button class='small-btn' onclick='deleteOne(${i.idx})'>삭제</button>
          </div>`;
        });
      });
    }

    div.innerHTML = html;
    cal.appendChild(div);
  }

  // ✅ 월 전체 합계 표시
  document.getElementById('monthTotal').innerText = `이번달 총 합계: ${monthTotal.toLocaleString()}원`;
}

// ✅ 월 전체 삭제
function deleteMonth(){
  const year = current.getFullYear();
  const month = current.getMonth();

  entries = entries.filter(e => {
    const d = new Date(e.date);
    return !(d.getFullYear() === year && d.getMonth() === month);
  });

  save();
  render();
}

function deleteOne(idx) {
  entries.splice(idx,1);
  save();
  render();
}

render();
</script>

</body>
</html>
